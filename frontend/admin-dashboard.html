<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TurfArena - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    
    body { padding: 40px; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding-bottom: 15px; margin-bottom: 20px; }
    .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit', sans-serif;}
    .btn-danger { background: var(--danger); }
    .control-panel { background: var(--card-bg); padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 30px; align-items: center; border: 1px solid rgba(59, 130, 246, 0.2); }
    select, input { padding: 8px; border-radius: 5px; border: 1px solid rgba(59, 130, 246, 0.5); background: rgba(2, 6, 23, 0.8); color: white; }
    .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .slot { padding: 15px; text-align: center; background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .slot:hover { border-color: var(--primary); }
    .slot.booked { background: var(--primary-hover); border-color: var(--primary); cursor: not-allowed; }
    .slot.blocked { background: var(--danger); border-color: #991b1b; }
    .legend { display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
  </style>
</head>
<body>

  <header>
    <h2>🛡️ TurfArena Admin Control</h2>
    <button class="btn btn-danger" onclick="window.location.href='/'">Logout / Go Home</button>
  </header>

  <div class="control-panel">
    <div>
      <label>Select Turf: </label>
      <select id="turfSelect" onchange="loadData()"></select>
    </div>
    <div>
      <label>Select Date: </label>
      <input type="date" id="adminDate" onchange="loadData()">
    </div>
    <span id="statusMessage" style="color: #4ade80; font-size: 14px; margin-left: auto;"></span>
  </div>

  <div class="legend">
    <span><div class="dot" style="background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(59, 130, 246, 0.3);"></div> Free (Click to Block)</span>
    <span><div class="dot" style="background: var(--danger);"></div> Blocked (Click to Unblock)</span>
    <span><div class="dot" style="background: var(--primary-hover);"></div> User Booked (Cannot change)</span>
  </div>

  <div class="slots-grid" id="adminSlotsGrid">
    </div>

  <script>
    let turfs = {};
    let bookings = {};
    let blockedSlots = {};

    async function initAdmin() {
      // Set today's date
      const dateInput = document.getElementById('adminDate');
      dateInput.value = new Date().toISOString().split('T')[0];

      // Fetch Turfs to populate dropdown
      try {
        const res = await fetch('/api/turfs');
        turfs = await res.json();
        
        const select = document.getElementById('turfSelect');
        Object.values(turfs).forEach(t => {
          select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
        
        loadData();
      } catch (err) {
        alert("Cannot connect to server.");
      }
    }

    async function loadData() {
      const date = document.getElementById('adminDate').value;
      const turfId = document.getElementById('turfSelect').value;
      if(!date || !turfId) return;

      try {
        const bRes = await fetch(`/api/bookings?date=${date}`);
        bookings = await bRes.json();

        const blRes = await fetch(`/api/blocked-slots?date=${date}`);
        blockedSlots = await blRes.json();

        renderAdminSlots(turfId);
      } catch (err) {
        console.error(err);
      }
    }

    function renderAdminSlots(turfId) {
      const grid = document.getElementById('adminSlotsGrid');
      grid.innerHTML = '';
      
      const turfBookings = bookings[turfId] || [];
      const turfBlocked = blockedSlots[turfId] || [];

      for(let h = 0; h < 24; h++) {
        const div = document.createElement('div');
        div.className = 'slot';
        div.textContent = `${h % 12 || 12}:00 ${h < 12 ? 'AM' : 'PM'}`;

        if (turfBookings.includes(h)) {
          div.classList.add('booked');
          div.title = "Booked by a user";
        } else if (turfBlocked.includes(h)) {
          div.classList.add('blocked');
          div.title = "Blocked by Admin. Click to unblock.";
          div.onclick = () => toggleBlock(turfId, h, 'unblock');
        } else {
          div.title = "Free. Click to block.";
          div.onclick = () => toggleBlock(turfId, h, 'block');
        }

        grid.appendChild(div);
      }
    }

    async function toggleBlock(turfId, slotHour, action) {
      const date = document.getElementById('adminDate').value;
      const method = action === 'block' ? 'POST' : 'DELETE';
      const msgEl = document.getElementById('statusMessage');

      msgEl.textContent = "Saving...";
      msgEl.style.color = "#fbbf24";

      try {
        await fetch('/api/blocked-slots', {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ turfId, date, slotHour })
        });
        
        msgEl.textContent = action === 'block' ? "Slot Blocked!" : "Slot Unblocked!";
        msgEl.style.color = "#4ade80";
        setTimeout(() => msgEl.textContent = "", 2000);
        
        loadData(); // Reload UI
      } catch (err) {
        msgEl.textContent = "Error saving to DB";
        msgEl.style.color = "var(--danger)";
      }
    }

    window.onload = initAdmin;
  </script>
</body>
</html>
