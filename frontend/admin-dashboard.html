<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TurfArena - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="theme.css" />
  <style>

    body { padding: 40px; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
    
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn { background: var(--accent); color: var(--btn-text); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit', sans-serif;}
    .btn-danger { background: var(--danger); color: white; }
    
    .control-panel { 
      background: var(--surface); 
      padding: 20px; 
      border-radius: 12px; 
      display: flex; 
      gap: 15px; 
      margin-bottom: 30px; 
      align-items: center; 
      border: 1px solid var(--border); 
    }    
    
    select, input { 
      padding: 8px; 
      border-radius: 8px; 
      border: 1px solid var(--border); 
      background: var(--input-bg); 
      color: var(--text-primary); 
      outline: none;
    }

    .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    
    .slot { 
      padding: 15px; 
      text-align: center; 
      background: var(--surface); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      color: var(--text-primary);
      font-size: 14px;
    }
    
    .slot:hover { border-color: var(--accent); transform: translateY(-2px); }
    .slot.booked { background: var(--accent-soft); border-color: var(--accent); cursor: not-allowed; opacity: 0.7; }
    .slot.blocked { background: var(--danger); border-color: var(--danger); color: white; }
    
    .legend { display: flex; gap: 20px; margin-bottom: 20px; font-size: 14px; color: var(--text-secondary); }
    .legend span { display: flex; align-items: center; gap: 8px; } 
    .dot { width: 14px; height: 14px; border-radius: 4px; }

    h2 { color: var(--text-primary); margin: 0; }
    label { color: var(--text-primary); font-weight: 500; }
  </style>
</head>
<body>

  <header>
    <h2><i class="fa-solid fa-shield-halved" style="color: var(--accent);"></i> TurfArena Admin</h2>
    <div class="header-actions">
      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        title="Toggle theme"
        aria-label="Toggle theme"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
          width="1em"
          height="1em"
          fill="currentColor"
          stroke-linecap="round"
          class="theme-toggle__classic"
          viewBox="0 0 32 32"
        >
          <clipPath id="theme-toggle__classic__cutout">
            <path d="M0-5h30a1 1 0 0 0 9 13v24H0Z" />
          </clipPath>
          <g clip-path="url(#theme-toggle__classic__cutout)">
            <circle cx="16" cy="16" r="9.34" />
            <g stroke="currentColor" stroke-width="1.5">
              <path d="M16 5.5v-4" />
              <path d="M16 30.5v-4" />
              <path d="M1.5 16h4" />
              <path d="M26.5 16h4" />
              <path d="m23.4 8.6 2.8-2.8" />
              <path d="m5.7 26.3 2.9-2.9" />
              <path d="m5.8 5.8 2.8 2.8" />
              <path d="m23.4 23.4 2.9 2.9" />
            </g>
          </g>
        </svg>
      </button>
      <button class="btn btn-danger" onclick="window.location.href='index.html'"><i class="fa-solid fa-power-off"></i> Logout</button>
    </div>
  </header>

  <div class="control-panel">
    <div>
      <label>Select Turf: </label>
      <select id="turfSelect" onchange="loadData()"></select>      
    </div>
    <div>
      <label>Select Date: </label>
      <input type="date" id="adminDate" onchange="loadData()">     
    </div>
    <button class="btn" style="margin-left: 10px;" onclick="openAddTurfModal()"><i class="fa-solid fa-plus"></i> Add Turf</button>
    <button class="btn btn-danger" style="margin-left: 10px;" onclick="deleteTurf()"><i class="fa-solid fa-trash"></i> Delete Selected</button>
    <span id="statusMessage" style="font-size: 14px; margin-left: auto; font-weight: 600;"></span>
  </div>

  <!-- Add Turf Modal -->
  <div id="addTurfModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); z-index:100; align-items:center; justify-content:center;">
    <div style="background:var(--surface); padding:30px; border-radius:15px; width:400px; border:1px solid var(--border);">
      <h3 style="margin-top:0; color:var(--text-primary);">Add New Turf</h3>
      <div style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
        <input type="text" id="newTurfName" placeholder="Turf Name">
        <input type="text" id="newTurfLocation" placeholder="Location (e.g. Velachery)">
        <input type="text" id="newTurfSports" placeholder="Sports (e.g. Football, Cricket)">
        <input type="number" id="newTurfPrice" placeholder="Base Price per Hour">
        <input type="text" id="newTurfImage" placeholder="Image Filename (e.g. aerial-view-grass-field-hockey.jpg)">
        <input type="text" id="newTurfPanorama" placeholder="Panorama Filename (e.g. turf1-360.jpg)">
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn btn-danger" style="flex:1;" onclick="closeAddTurfModal()">Cancel</button>
          <button class="btn" style="flex:1;" onclick="saveNewTurf()">Save Turf</button>
        </div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span><div class="dot" style="background: var(--surface); border: 1px solid var(--border);"></div> Free (Click to Block)</span>
    <span><div class="dot" style="background: var(--danger);"></div> Blocked (Click to Unblock)</span>
    <span><div class="dot" style="background: var(--accent-soft); border: 1px solid var(--accent);"></div> User Booked</span>
  </div>

  <div class="slots-grid" id="adminSlotsGrid"></div>

  <script>
    // --- Theme Logic ---
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    let turfs = {};
    let bookings = {};
    let blockedSlots = {};

    async function initAdmin() {
      // Set today's date
      const dateInput = document.getElementById('adminDate');      
      dateInput.value = new Date().toISOString().split('T')[0];    

      // Fetch Turfs to populate dropdown
      try {
        const res = await fetch('/api/turfs');
        if (!res.ok) throw new Error("Offline");
        turfs = await res.json();

        const select = document.getElementById('turfSelect');      
        select.innerHTML = ''; // Clear existing
        Object.values(turfs).forEach(t => {
          select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });

        loadData();
      } catch (err) {
        console.error("Server offline, using fallback.");
        // Fallback turfs
        turfs = {
          1: { id: 1, name: "GreenLine Arena" },
          2: { id: 2, name: "Boundary Line Turf" },
          3: { id: 3, name: "SkyLine Sports Hub" }
        };
        const select = document.getElementById('turfSelect');      
        select.innerHTML = '';
        Object.values(turfs).forEach(t => {
          select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
        loadData();
      }
    }

    function openAddTurfModal() {
      document.getElementById('addTurfModal').style.display = 'flex';
    }

    function closeAddTurfModal() {
      document.getElementById('addTurfModal').style.display = 'none';
    }

    async function saveNewTurf() {
      const name = document.getElementById('newTurfName').value;
      const location = document.getElementById('newTurfLocation').value;
      const sports = document.getElementById('newTurfSports').value;
      const price = document.getElementById('newTurfPrice').value;
      const image = document.getElementById('newTurfImage').value;
      const panorama = document.getElementById('newTurfPanorama').value;

      if (!name || !location || !sports || !price) {
        alert("Please fill all required fields");
        return;
      }

      const meta = `${location} • ${sports}`;

      try {
        const res = await fetch('/api/turfs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name, meta, basePrice: parseInt(price), panoramaUrl: panorama, imageUrl: image
          })
        });

        if (res.ok) {
          alert("Turf added successfully!");
          closeAddTurfModal();
          initAdmin(); // Refresh list
        } else {
          alert("Failed to add turf");
        }
      } catch (err) {
        console.error("Error adding turf:", err);
      }
    }

    async function deleteTurf() {
      const turfId = document.getElementById('turfSelect').value;
      if (!turfId) return;

      const turfName = turfs[turfId].name;
      if (!confirm(`Are you sure you want to delete "${turfName}"? All related bookings will be lost.`)) {
        return;
      }

      try {
        const res = await fetch(`/api/turfs/${turfId}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          alert("Turf deleted successfully!");
          initAdmin(); // Refresh list
        } else {
          alert("Failed to delete turf");
        }
      } catch (err) {
        console.error("Error deleting turf:", err);
      }
    }

    async function loadData() {
      const date = document.getElementById('adminDate').value;     
      const turfId = document.getElementById('turfSelect').value;  
      if(!date || !turfId) return;

      try {
        const bRes = await fetch(`/api/bookings?date=${date}`);    
        if (bRes.ok) bookings = await bRes.json();

        const blRes = await fetch(`/api/blocked-slots?date=${date}`);
        if (blRes.ok) blockedSlots = await blRes.json();

        renderAdminSlots(turfId);
      } catch (err) {
        console.error("Fetch error:", err);
        renderAdminSlots(turfId);
      }
    }

    function renderAdminSlots(turfId) {
      const grid = document.getElementById('adminSlotsGrid');      
      grid.innerHTML = '';

      const turfBookings = bookings[turfId] || [];
      const turfBlocked = blockedSlots[turfId] || [];

      for(let h = 0; h < 24; h++) {
        const div = document.createElement('div');
        div.className = 'slot';
        div.textContent = `${h % 12 || 12}:00 ${h < 12 ? 'AM' : 'PM'}`;

        if (turfBookings.includes(h)) {
          div.classList.add('booked');
          div.title = "Booked by a user";
        } else if (turfBlocked.includes(h)) {
          div.classList.add('blocked');
          div.title = "Blocked by Admin. Click to unblock.";       
          div.onclick = () => toggleBlock(turfId, h, 'unblock');   
        } else {
          div.title = "Free. Click to block.";
          div.onclick = () => toggleBlock(turfId, h, 'block');     
        }

        grid.appendChild(div);
      }
    }

    async function toggleBlock(turfId, slotHour, action) {
      const date = document.getElementById('adminDate').value;     
      const method = action === 'block' ? 'POST' : 'DELETE';       
      const msgEl = document.getElementById('statusMessage');      

      msgEl.textContent = "Saving...";
      msgEl.style.color = "var(--accent)";

      try {
        const res = await fetch('/api/blocked-slots', {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            turfId: parseInt(turfId), 
            date, 
            slotHour: parseInt(slotHour) 
          })
        });

        if (res.ok) {
          msgEl.textContent = action === 'block' ? "Slot Blocked!" : "Slot Unblocked!";
          msgEl.style.color = "var(--success)";
        } else {
          throw new Error("Failed");
        }
        
        setTimeout(() => msgEl.textContent = "", 2000);
        loadData(); // Reload UI
      } catch (err) {
        msgEl.textContent = "Error saving changes";
        msgEl.style.color = "var(--danger)";
      }
    }

    window.onload = initAdmin;
  </script>
</body>
</html>
