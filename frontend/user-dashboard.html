<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Dashboard - TurfArena</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      padding: 40px 5vw;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 32px;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 32px;
      border-radius: 24px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: var(--blue-gradient);
      border-radius: 50%;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      box-shadow: 0 0 20px var(--accent-soft);
      color: #fff;
    }

    .profile-detail {
      text-align: left;
      font-size: 14px;
    }

    .profile-detail label {
      color: var(--text-secondary);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }

    .dashboard-main {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .dashboard-panel {
      padding: 32px;
      border-radius: 24px;
    }

    h2 { margin: 0 0 20px; font-weight: 700; font-size: 24px; letter-spacing: -0.02em; color: var(--text-primary); }

    .booking-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .booking-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      transition: all 0.3s ease;
    }

    .booking-card:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .booking-turf { font-weight: 600; color: var(--accent); font-size: 18px; margin-bottom: 4px;}
    .booking-meta { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
    .booking-price { font-weight: 700; font-size: 18px; color: var(--text-primary); }

    .header-nav {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 999px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Outfit', sans-serif;
    }

    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .theme-btn {
      background: var(--glass-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .theme-btn:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header-nav">
    <a href="index.html" class="btn-outline-gold"><i class="fa-solid fa-arrow-left"></i> Back to Reservations</a>
    <div class="header-actions">
      <button id="themeToggle" class="theme-btn" title="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <button class="btn-logout" title="Sign Out" onclick="handleLogout()"><i class="fa-solid fa-power-off"></i> Sign Out</button>      
    </div>
  </div>

  <div class="container">
    <div class="glass-panel profile-info">
      <div class="avatar" id="avatarInit"><i class="fa-solid fa-user"></i></div>
      <h3 id="userNameDisplay" style="margin: 0; font-size: 22px; color: var(--text-primary);">User</h3>
      <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; display: flex; flex-direction: column; gap: 16px;">
        <div class="profile-detail">
          <label><i class="fa-solid fa-envelope" style="color:var(--accent);"></i> Email Address</label>
          <span id="userEmailDisplay" style="color: var(--text-primary);">...</span>
        </div>
        <div class="profile-detail">
          <label><i class="fa-solid fa-phone" style="color:var(--accent);"></i> Mobile Number</label>
          <span id="userPhoneDisplay" style="color: var(--text-primary);">...</span>
        </div>
        <div class="profile-detail">
          <label><i class="fa-solid fa-gem" style="color:var(--accent);"></i> VIP Member Since</label>
          <span id="userJoinDisplay" style="color: var(--accent); font-weight: 500;">...</span>
        </div>
      </div>
    </div>

    <div class="dashboard-main">
      <div class="glass-panel dashboard-panel">
        <h2><i class="fa-solid fa-clock-rotate-left" style="color:var(--accent);"></i> Your Past Reservations</h2>
        <div class="booking-list" id="userBookingsList">
          <div style="color: var(--text-secondary); text-align: center; padding: 20px;">Loading bookings...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Theme Logic ---
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.innerHTML = savedTheme === 'light' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.innerHTML = newTheme === 'light' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });

    function loadUserData() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user) {
        window.location.href = 'user-login.html';
        return;
      }

      document.getElementById('userNameDisplay').textContent = user.name;
      document.getElementById('userEmailDisplay').textContent = user.email;
      document.getElementById('userPhoneDisplay').textContent = user.phone;
      document.getElementById('userJoinDisplay').textContent = user.joinedDate || "Just now";
      document.getElementById('avatarInit').innerHTML = '<i class="fa-solid fa-user"></i>';

      fetchBookings(user.phone);
    }

    async function fetchBookings(phone) {
      const list = document.getElementById('userBookingsList');    
      try {
        const response = await fetch(`http://localhost:5000/api/user/bookings/${encodeURIComponent(phone)}`);
        if (!response.ok) throw new Error('Failed to fetch bookings');

        const history = await response.json();

        if (history.length === 0) {
          list.innerHTML = "<div style='color: var(--text-secondary); text-align: center; padding: 30px; font-weight: 500;'>No bookings found. Head back to the reservation page to book a luxury turf!</div>";
          return;
        }

        list.innerHTML = history.map(b => `
          <div class="booking-card">
            <div>
              <div class="booking-turf">${b.turf}</div>
              <div class="booking-meta">${b.date} • <span style="color: var(--text-primary); font-weight: 500;">${b.time}</span></div> 
              <div class="booking-meta" style="color: var(--success); font-weight: 600; margin-top: 8px;">${b.status}</div>
            </div>
            <div class="booking-price">${b.price}</div>
          </div>
        `).join('');

      } catch (err) {
        list.innerHTML = "<div style='color: var(--danger); text-align: center; padding: 20px;'>Error loading reservations from server.</div>";
        console.error(err);
      }
    }

    function handleLogout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }

    window.onload = loadUserData;
  </script>
</body>
</html>
